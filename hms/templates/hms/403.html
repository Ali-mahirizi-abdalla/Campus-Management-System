<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Denied – Campus Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-10 text-center max-w-lg w-full border border-slate-200 shadow-2xl shadow-slate-200/50">
        <div class="text-7xl mb-6 select-none animate-bounce">🔒</div>
        <h1 class="text-3xl font-extrabold text-red-600 mb-3 tracking-tight">Access Denied</h1>
        <p class="text-slate-500 font-medium mb-6">
            You do not have permission to access this area. If you believe this is an error, please contact the system administrator.
        </p>
        
        {% if user.is_authenticated and hasattr(user, 'staff_profile') %}
        <div class="bg-slate-50 border border-slate-200 p-4 rounded-2xl mb-8 flex items-center justify-center gap-3">
            <span class="text-slate-500 font-medium">Your Role:</span>
            <span class="font-mono font-bold text-slate-800 bg-white px-3 py-1 rounded-lg border border-slate-200 shadow-sm">
                {{ user.staff_profile.get_role_display }}
            </span>
        </div>
        {% endif %}
        
        <a href="{% if user.is_staff %}/manage/dashboard/{% else %}/student/dashboard/{% endif %}" 
           class="inline-block bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 px-8 rounded-full transition-all transform hover:-translate-y-0.5 shadow-lg shadow-slate-900/20">
            Return to Dashboard
        </a>
    </div>
</body>
</html>
